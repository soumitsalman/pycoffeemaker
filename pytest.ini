[pytest]
testpaths = tests pybeansack/tests
pythonpath = .
python_files = test_*.py *_test.py test.py
addopts = -m "not integration" -s
markers =
    integration: opt-in smoke/integration tests (network, DB, GPU)
    pg: PostgreSQL / pybeansack pgsack integration tests
    duck: DuckDB / DuckLake pybeansack integration tests
    lance: LanceDB pybeansack integration tests
    collect: API collector smoke test
    scrape: web scraper smoke test
    scrapepubs: publisher scraper smoke test
    orch_collector: collector orchestrator
    orch_embedder: embedder orchestrator
    orch_extractor: extractor orchestrator
    orch_digestor: digestor orchestrator
    orch_classifier: classifier orchestrator
    group_to_str: _group_to_str text length probe
    orch_porter: porter orchestrator (beansack or cupboard)
    cache: processing cache smoke test
    vector: cupboard vector search smoke test
