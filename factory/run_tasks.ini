[Unit]
Description=Analyzer Batch Job
After=network-online.target
Wants=network-online.target

[Service]
Type=oneshot
User=ubuntu
WorkingDirectory=/home/ubuntu/pycoffeemaker

ExecStart=/home/ubuntu/pycoffeemaker/run_cupboard.sh --consolidator-batch-size 64 --digestor-batch-size 128

StandardOutput=append:/home/ubuntu/pycoffeemaker/.logs/cupboard.log
StandardError=append:/home/ubuntu/pycoffeemaker/.logs/cupboard.log

RemainAfterExit=yes

[Install]
WantedBy=multi-user.target