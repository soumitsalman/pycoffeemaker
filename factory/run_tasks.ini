[Unit]
Description=Analyzer Batch Job
After=network-online.target
Wants=network-online.target

[Service]
Type=oneshot
User=ubuntu
WorkingDirectory=/home/ubuntu/pycoffeemaker

ExecStart=/home/ubuntu/pycoffeemaker/run_pipeline.sh --digestor 128 --consolidator 128

StandardOutput=append:/home/ubuntu/pycoffeemaker/.logs/thundercompute-tasks.log
StandardError=append:/home/ubuntu/pycoffeemaker/.logs/thundercompute-tasks.log

RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
